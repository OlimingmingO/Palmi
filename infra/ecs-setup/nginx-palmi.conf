# Palmi nginx reverse proxy config
# Deploy: ln -s /etc/nginx/sites-available/palmi /etc/nginx/sites-enabled/
# SSL is managed by certbot: certbot --nginx -d palmi.aiotzz.cn

server {
    listen 80;
    server_name palmi.aiotzz.cn;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
